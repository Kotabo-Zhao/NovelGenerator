services:
  - type: web
    name: novelgenerator
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn api.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: HOST
        value: 0.0.0.0
      - key: NOVELS_DIR
        value: /var/data/novels
    disk:
      name: novel-storage
      mountPath: /var/data
      sizeGB: 1
