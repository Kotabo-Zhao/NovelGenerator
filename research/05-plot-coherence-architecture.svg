<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 560" width="100%">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3B6D11" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#854F0B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="30" text-anchor="middle" font-size="15" font-weight="500" fill="#000" font-family="sans-serif">NovelGenerator 剧情连贯性系统优化</text>
  <text x="340" y="48" text-anchor="middle" font-size="12" fill="#555" font-family="sans-serif">基于 storygraph + arcplanner + autocalibrator 的三层记忆架构</text>

  <!-- top section -->
  <rect x="40" y="64" width="600" height="160" rx="16" fill="#f5f5f5" stroke="#999" stroke-width="0.5"/>
  <text x="56" y="84" font-size="13" font-weight="500" fill="#555" font-family="sans-serif">当前管线 — 线性生成，无结构化记忆</text>

  <rect x="56" y="96" width="100" height="40" rx="8" fill="#cce5ff" stroke="#0066cc" stroke-width="0.5"/>
  <text x="106" y="126" text-anchor="middle" font-size="12" font-weight="500" fill="#003366" font-family="sans-serif">planner (大纲)</text>

  <path d="M156 116L170 116" fill="none" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="172" y="96" width="100" height="40" rx="8" fill="#cce5ff" stroke="#0066cc" stroke-width="0.5"/>
  <text x="222" y="126" text-anchor="middle" font-size="12" font-weight="500" fill="#003366" font-family="sans-serif">writer (写作)</text>

  <path d="M272 116L286 116" fill="none" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="288" y="96" width="100" height="40" rx="8" fill="#cce5ff" stroke="#0066cc" stroke-width="0.5"/>
  <text x="338" y="126" text-anchor="middle" font-size="12" font-weight="500" fill="#003366" font-family="sans-serif">ctxt_updt (压缩)</text>

  <path d="M388 116L402 116" fill="none" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="404" y="96" width="100" height="40" rx="8" fill="#cce5ff" stroke="#0066cc" stroke-width="0.5"/>
  <text x="454" y="126" text-anchor="middle" font-size="12" font-weight="500" fill="#003366" font-family="sans-serif">fv_shadow (伏笔)</text>

  <path d="M504 116L518 116" fill="none" stroke="#999" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="520" y="96" width="100" height="40" rx="8" fill="#cce5ff" stroke="#0066cc" stroke-width="0.5"/>
  <text x="570" y="126" text-anchor="middle" font-size="12" font-weight="500" fill="#003366" font-family="sans-serif">validator (可选)</text>

  <!-- Problems -->
  <rect x="56" y="150" width="120" height="28" rx="6" fill="#ffe6e6" stroke="#cc3333" stroke-width="0.5"/>
  <text x="116" y="168" text-anchor="middle" font-size="10" fill="#990000" font-family="sans-serif">线性压缩丢关键</text>
  <rect x="186" y="150" width="120" height="28" rx="6" fill="#ffe6e6" stroke="#cc3333" stroke-width="0.5"/>
  <text x="246" y="168" text-anchor="middle" font-size="10" fill="#990000" font-family="sans-serif">无剧情线优先级</text>
  <rect x="316" y="150" width="120" height="28" rx="6" fill="#ffe6e6" stroke="#cc3333" stroke-width="0.5"/>
  <text x="376" y="168" text-anchor="middle" font-size="10" fill="#990000" font-family="sans-serif">无跨章弧规划</text>
  <rect x="446" y="150" width="120" height="28" rx="6" fill="#ffe6e6" stroke="#cc3333" stroke-width="0.5"/>
  <text x="506" y="168" text-anchor="middle" font-size="10" fill="#990000" font-family="sans-serif">无定期校准</text>

  <!-- arrow -->
  <path d="M340 230L340 250" fill="none" stroke="#cc6600" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="355" y="244" font-size="10" fill="#cc6600" font-family="sans-serif">新增三层记忆架构</text>

  <!-- bottom section -->
  <rect x="40" y="254" width="600" height="290" rx="16" fill="#e8f5e9" stroke="#4caf50" stroke-width="0.5"/>
  <text x="56" y="274" font-size="13" font-weight="500" fill="#2e7d32" font-family="sans-serif">优化后 — 剧情图谱 + 弧规划 + 自动校准</text>

  <!-- L0 -->
  <rect x="56" y="286" width="568" height="36" rx="6" fill="#a5d6a7" stroke="#4caf50" stroke-width="0.5"/>
  <text x="340" y="308" text-anchor="middle" font-size="12" font-weight="500" fill="#1b5e20" font-family="sans-serif">L0: 剧情图谱 (storygraph) — 替代线性压缩记忆</text>

  <rect x="60" y="328" width="134" height="34" rx="4" fill="#e8f5e9" stroke="#4caf50" stroke-width="0.5"/>
  <text x="127" y="349" text-anchor="middle" font-size="11" fill="#1b5e20" font-family="sans-serif">剧情线 threads</text>
  <rect x="200" y="328" width="134" height="34" rx="4" fill="#e8f5e9" stroke="#4caf50" stroke-width="0.5"/>
  <text x="267" y="349" text-anchor="middle" font-size="11" fill="#1b5e20" font-family="sans-serif">伏笔账本 ledger</text>
  <rect x="340" y="328" width="134" height="34" rx="4" fill="#e8f5e9" stroke="#4caf50" stroke-width="0.5"/>
  <text x="407" y="349" text-anchor="middle" font-size="11" fill="#1b5e20" font-family="sans-serif">角色快照 snapshot</text>
  <rect x="480" y="328" width="134" height="34" rx="4" fill="#e8f5e9" stroke="#4caf50" stroke-width="0.5"/>
  <text x="547" y="349" text-anchor="middle" font-size="11" fill="#1b5e20" font-family="sans-serif">因果链 causal</text>

  <!-- L1 -->
  <rect x="56" y="374" width="568" height="36" rx="6" fill="#a5d6a7" stroke="#4caf50" stroke-width="0.5"/>
  <text x="340" y="396" text-anchor="middle" font-size="12" font-weight="500" fill="#1b5e20" font-family="sans-serif">L1: 弧规划器 (arcplanner) — 章节打包为3-8章剧情弧</text>

  <rect x="60" y="416" width="88" height="30" rx="4" fill="#e8f5e9" stroke="#4caf50" stroke-width="0.5"/>
  <text x="104" y="434" text-anchor="middle" font-size="10" fill="#1b5e20" font-family="sans-serif">铺垫章</text>
  <path d="M148 431L158 431" fill="none" stroke="#4caf50" stroke-width="1" marker-end="url(#arrow-green)"/>
  <rect x="160" y="416" width="88" height="30" rx="4" fill="#e8f5e9" stroke="#4caf50" stroke-width="0.5"/>
  <text x="204" y="434" text-anchor="middle" font-size="10" fill="#1b5e20" font-family="sans-serif">升级章</text>
  <path d="M248 431L258 431" fill="none" stroke="#4caf50" stroke-width="1" marker-end="url(#arrow-green)"/>
  <rect x="260" y="416" width="88" height="30" rx="4" fill="#81c784" stroke="#4caf50" stroke-width="0.5"/>
  <text x="304" y="434" text-anchor="middle" font-size="10" fill="#1b5e20" font-family="sans-serif">高潮章</text>
  <path d="M348 431L358 431" fill="none" stroke="#4caf50" stroke-width="1" marker-end="url(#arrow-green)"/>
  <rect x="360" y="416" width="88" height="30" rx="4" fill="#e8f5e9" stroke="#4caf50" stroke-width="0.5"/>
  <text x="404" y="434" text-anchor="middle" font-size="10" fill="#1b5e20" font-family="sans-serif">余波章</text>

  <!-- L2 -->
  <rect x="56" y="458" width="568" height="36" rx="6" fill="#a5d6a7" stroke="#4caf50" stroke-width="0.5"/>
  <text x="340" y="480" text-anchor="middle" font-size="12" font-weight="500" fill="#1b5e20" font-family="sans-serif">L2: 自动校准器 (autocalibrator) — 每10章比对图谱 vs 实际</text>

  <rect x="60" y="500" width="134" height="28" rx="4" fill="#e8f5e9" stroke="#4caf50" stroke-width="0.5"/>
  <text x="127" y="518" text-anchor="middle" font-size="10" fill="#1b5e20" font-family="sans-serif">检测剧情偏移</text>
  <rect x="200" y="500" width="134" height="28" rx="4" fill="#e8f5e9" stroke="#4caf50" stroke-width="0.5"/>
  <text x="267" y="518" text-anchor="middle" font-size="10" fill="#1b5e20" font-family="sans-serif">伏笔到期提醒</text>
  <rect x="340" y="500" width="134" height="28" rx="4" fill="#e8f5e9" stroke="#4caf50" stroke-width="0.5"/>
  <text x="407" y="518" text-anchor="middle" font-size="10" fill="#1b5e20" font-family="sans-serif">角色一致性校验</text>
  <rect x="480" y="500" width="134" height="28" rx="4" fill="#e8f5e9" stroke="#4caf50" stroke-width="0.5"/>
  <text x="547" y="518" text-anchor="middle" font-size="10" fill="#1b5e20" font-family="sans-serif">校准报告注入</text>
</svg>