<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0d1117">
    <title>NovelGenerator</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<script src="/vue.global.prod.js"></script>
<script>
// SW 更新自动重载 — 解决缓存导致旧版本卡住的问题
if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
  navigator.serviceWorker.addEventListener('message', event => {
    if (event.data && event.data.type === 'SW_UPDATED') {
      window.location.reload();
    }
  });
}
</script>
<style>
:root {
  --bg: #0d1117; --bg2: #161b22; --card: #1c2129; --card-hover: #212830;
  --text: #e6edf3; --text2: #8b949e; --text3: #484f58;
  --accent: #f0883e; --blue: #58a6ff; --green: #3fb950; --red: #f85149;
  --border: #30363d; --border-light: #21262d;
  --radius: 14px; --radius-sm: 10px; --radius-xs: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.15);
  --font: -apple-system,BlinkMacSystemFont,'SF Pro Text','PingFang SC','Microsoft YaHei',sans-serif;
  --font-mono: 'SF Mono','JetBrains Mono','Fira Code','Consolas',monospace;
}
[data-theme="light"] {
  --bg: #f5f5f7; --bg2: #ffffff; --card: #ffffff; --card-hover: #f0f0f5;
  --text: #1d1d1f; --text2: #6e6e73; --text3: #aeaeb2;
  --accent: #e07030; --blue: #0071e3; --green: #248a3d; --red: #e0323a;
  --border: #d2d2d7; --border-light: #e5e5ea;
  --shadow: 0 1px 3px rgba(0,0,0,.04), 0 4px 12px rgba(0,0,0,.06);
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:15px}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

#app{display:flex;min-height:100dvh}

/* ── Sidebar ── */
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border-light);display:flex;flex-direction:column;padding:24px 0;position:sticky;top:0;height:100dvh;flex-shrink:0}
.sidebar-logo{padding:0 20px 24px;font-size:18px;font-weight:700;letter-spacing:-.3px;display:flex;align-items:center;gap:10px;color:var(--text)}
.sidebar-logo .dot{width:8px;height:8px;background:var(--accent);border-radius:50%}
.sidebar-nav{flex:1;padding:0 12px}
.sidebar-nav .nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:var(--radius-xs);font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;margin-bottom:2px;transition:all .15s}
.sidebar-nav .nav-item:hover{background:var(--card);color:var(--text)}
.sidebar-nav .nav-item.active{background:var(--card);color:var(--accent)}
.sidebar-nav .nav-icon{font-size:17px;width:22px;text-align:center;opacity:.7}
.sidebar-nav .nav-item.active .nav-icon{opacity:1}
.sidebar-footer{padding:16px 20px 8px;font-size:11px;color:var(--text3);display:flex;align-items:center;gap:8px}
.theme-toggle{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:50%;cursor:pointer;font-size:15px;transition:all .15s;border:1px solid var(--border)}.theme-toggle:hover{background:var(--card);border-color:var(--text3)}

/* ── Main ── */
.main{flex:1;max-width:860px;padding:32px 40px 80px;min-width:0}
.main-header{margin-bottom:28px}
.main-header h2{font-size:22px;font-weight:700;letter-spacing:-.3px;margin-bottom:6px}
.main-header .sub{font-size:13px;color:var(--text2)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 18px;border-radius:var(--radius-xs);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;line-height:1.4}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#e07b30}
.btn-secondary{background:var(--border);color:var(--text)}.btn-secondary:hover{background:#3a4654}
.btn-ghost{background:transparent;color:var(--text2)}.btn-ghost:hover{background:var(--border);color:var(--text)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-xs{padding:4px 10px;font-size:11px}

/* ── Form ── */
input,textarea,select{width:100%;padding:10px 14px;border-radius:var(--radius-xs);border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border .15s,box-shadow .15s}
input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(240,136,62,.15)}
textarea{resize:vertical;min-height:90px;line-height:1.6}
label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.form-group{margin-bottom:16px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:14px;transition:border .2s}
.card:hover{border-color:var(--border)}
.card-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:16px}

/* ── Style Picker ── */
.style-cat-title{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin:20px 0 10px;padding-left:2px;font-weight:600}
.style-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.style-card{padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-xs);cursor:pointer;transition:all .15s;text-align:center}
.style-card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.style-card.active{border-color:var(--accent);background:rgba(240,136,62,.08);box-shadow:0 0 0 1px var(--accent) inset}
.style-card .sc-name{font-size:13px;font-weight:600;margin-bottom:3px}
.style-card .sc-author{font-size:10px;color:var(--text3)}
.style-card .sc-desc{font-size:10px;color:var(--text3);margin-top:4px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* Parameterized Style Panel */
.param-panel{margin-top:4px}
.param-hint{font-size:12px;color:var(--text3);margin-bottom:16px;padding:8px 12px;background:var(--bg2);border-radius:var(--radius-xs)}
.param-group{margin-bottom:14px}
.param-label{font-size:13px;font-weight:600;margin-bottom:8px;color:var(--text)}
.param-options{display:flex;flex-wrap:wrap;gap:6px}
.param-btn{padding:6px 12px;border:1px solid var(--border);border-radius:20px;background:var(--bg);font-size:12px;cursor:pointer;transition:all .15s;color:var(--text2);white-space:nowrap}
.param-btn:hover{border-color:var(--accent);color:var(--accent)}
.param-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}

/* Requirements */
.req-list{max-height:200px;overflow-y:auto}
.req-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-left:3px solid var(--border);margin-bottom:3px;font-size:12px}
.req-status{flex-shrink:0}
.req-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.req-priority{flex-shrink:0;font-size:10px;font-weight:600}

/* ── Shelf Grid ── */
.shelf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
.book-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .2s}
.book-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--text3)}
.book-cover{height:100px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:rgba(255,255,255,.1);letter-spacing:3px;position:relative}
.book-cover::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,var(--card) 100%)}
.book-info{padding:14px 16px}
.book-info h3{font-size:15px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.book-info .meta{font-size:11px;color:var(--text2);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.book-progress{display:flex;align-items:center;gap:10px;padding:0 16px 14px}
.progress-bar{flex:1;height:3px;background:var(--border-light);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}
.progress-text{font-size:10px;color:var(--text3);white-space:nowrap;font-variant-numeric:tabular-nums}

/* ── Tags/Badges ── */
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;background:rgba(240,136,62,.12);color:var(--accent)}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.3px}
.badge-ok{background:rgba(63,185,80,.12);color:var(--green)}
.badge-warn{background:rgba(240,136,62,.12);color:var(--accent)}

/* ── Reading View ── */
.reading-container{max-width:650px;margin:0 auto}
.chapter-header{text-align:center;padding:24px 0 18px;border-bottom:1px solid var(--border);margin-bottom:20px}
.chapter-header h2{font-size:18px;font-weight:700}
.chapter-outline{background:var(--bg2);border:1px solid var(--border-light);border-radius:var(--radius-sm);padding:14px 18px;margin-bottom:18px;border-left:3px solid var(--accent)}
.chapter-outline .co-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px}
.chapter-outline .co-title{font-size:14px;font-weight:600;margin-bottom:4px}
.chapter-outline .co-summary{font-size:12px;color:var(--text2);line-height:1.5}
.chapter-outline .co-meta{font-size:10px;color:var(--text3);margin-top:6px;display:flex;gap:12px;flex-wrap:wrap}
.chapter-content{font-size:16px;line-height:2;color:var(--text);white-space:pre-wrap;padding:0 0 40px;font-family:'PingFang SC','Noto Serif SC','Songti SC','SimSun',serif}
.chapter-content p{margin:0 0 1.2em;text-indent:2em}
.chapter-empty{text-align:center;padding:60px 20px;color:var(--text3)}
.chapter-empty .ce-icon{font-size:48px;margin-bottom:12px;opacity:.3}

/* ── Chapter Picker ── */
.chapter-picker{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:18px;max-height:110px;overflow-y:auto;padding:2px 0}
.chapter-picker .cp-btn{min-width:36px;height:32px;display:flex;align-items:center;justify-content:center;background:var(--bg);border:1px solid var(--border);border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .15s;padding:0 8px}
.chapter-picker .cp-btn:hover{background:var(--card);color:var(--text)}
.chapter-picker .cp-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.chapter-picker .cp-btn.done{background:rgba(63,185,80,.08);border-color:rgba(63,185,80,.25);color:var(--green)}

/* ── Export ── */
.export-list{max-height:420px;overflow-y:auto}
.export-item{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px}
.export-item .ei-info{flex:1;min-width:0}
.export-item .ei-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.export-item .ei-meta{font-size:11px;color:var(--text3);margin-top:2px}
.export-item .ei-actions{display:flex;gap:6px;flex-shrink:0}
.export-check{width:18px;height:18px;border:2px solid var(--border);border-radius:5px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.export-check.checked{background:var(--accent);border-color:var(--accent)}
.export-check.checked::after{content:'✓';color:#fff;font-size:11px;font-weight:700}
.export-actions{display:flex;gap:8px;margin-top:16px}

/* ── Mobile Bottom Nav ── */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(22,27,34,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);z-index:100;padding:6px 0 max(6px,env(safe-area-inset-bottom))}
.bottom-nav .bn-item{flex:1;text-align:center;color:var(--text2);font-size:10px;cursor:pointer;padding:4px;transition:color .15s}
.bottom-nav .bn-item.active{color:var(--accent)}
.bottom-nav .bn-icon{font-size:20px;display:block;margin-bottom:1px}

/* ── Utilities ── */
.text-center{text-align:center}.text-sm{font-size:13px}.text-xs{font-size:11px}
.color-text2{color:var(--text2)}.color-text3{color:var(--text3)}.color-accent{color:var(--accent)}
.w-full{width:100%}.mt-4{margin-top:4px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mt-24{margin-top:24px}
.mb-4{margin-bottom:4px}.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}.mb-24{margin-bottom:24px}
.ml-8{margin-left:8px}.mr-8{margin-right:8px}.ml-auto{margin-left:auto}
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}.justify-center{justify-content:center}
.gap-6{gap:6px}.gap-8{gap:8px}.gap-12{gap:12px}.gap-16{gap:16px}.flex-wrap{flex-wrap:wrap}.flex-1{flex:1}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .5s linear infinite}
.progress-bar{width:100%;height:6px;background:var(--border-light);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s ease}
.toggle-switch{position:relative;display:inline-block;width:40px;height:22px}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:var(--border);border-radius:22px;transition:.2s}
.toggle-slider:before{content:'';position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:var(--text);border-radius:50%;transition:.2s}
.toggle-switch input:checked+.toggle-slider{background:var(--accent)}
.toggle-switch input:checked+.toggle-slider:before{transform:translateX(18px)}
@keyframes spin{to{transform:rotate(360deg)}}
.error-msg{background:rgba(248,81,73,.08);border:1px solid rgba(248,81,73,.2);border-radius:var(--radius-xs);padding:12px 16px;color:var(--red);font-size:13px;margin:12px 0}
/* Toast / Error Modal */
.toast-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:9999;display:flex;align-items:center;justify-content:center}
.toast-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);max-width:420px;width:90%;padding:24px;box-shadow:0 8px 32px rgba(0,0,0,.3);position:relative}
.toast-box .toast-icon{font-size:32px;text-align:center;margin-bottom:12px}
.toast-box .toast-title{font-size:16px;font-weight:600;margin-bottom:8px;text-align:center}
.toast-box .toast-body{font-size:14px;color:var(--text2);margin-bottom:20px;text-align:center;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.toast-box .toast-actions{text-align:center}
.toast-close{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:4px 8px;border-radius:4px}
.toast-close:hover{background:var(--bg2);color:var(--text)}
/* Toggle Switch */
.toggle-switch{position:relative;display:inline-flex;align-items:center;cursor:pointer}
.toggle-switch input{display:none}
.toggle-slider{width:40px;height:22px;background:var(--border);border-radius:11px;position:relative;transition:background .2s}
.toggle-slider:before{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:2px;left:2px;transition:transform .2s}
.toggle-switch input:checked+.toggle-slider{background:var(--accent)}
.toggle-switch input:checked+.toggle-slider:before{transform:translateX(18px)}
.success-msg{background:rgba(63,185,80,.08);border:1px solid rgba(63,185,80,.2);border-radius:var(--radius-xs);padding:12px 16px;color:var(--green);font-size:13px;margin:12px 0}
.empty{text-align:center;padding:48px 16px}
.empty .empty-icon{font-size:40px;margin-bottom:12px;opacity:.25}
.empty h3{font-size:16px;font-weight:600;margin-bottom:4px}
.empty p{font-size:13px;color:var(--text2);margin-bottom:16px}

/* ── Create Progress ── */
.create-progress{background:var(--bg2);border:1px solid var(--border-light);border-radius:var(--radius-sm);padding:16px 20px;margin-top:12px}
.create-progress .cp-bar{height:6px;background:var(--border-light);border-radius:3px;overflow:hidden;margin-bottom:8px}
.create-progress .cp-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--blue));border-radius:3px;transition:width .5s ease}
.create-progress .cp-info{display:flex;justify-content:space-between;align-items:center;font-size:12px}
.create-progress .cp-label{color:var(--text);font-weight:500}
.create-progress .cp-pct{color:var(--text3);font-variant-numeric:tabular-nums}

/* ── Review Section ── */
.review-section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin:16px 0}
.review-section .rs-title{font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text2)}
.review-section textarea{min-height:70px;margin-bottom:10px}

/* ── Batch Preview ── */
.batch-preview{max-height:200px;overflow-y:auto;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-xs);padding:12px;font-size:12px;color:var(--text2);font-family:var(--font-mono);white-space:pre-wrap;margin-top:8px}
.batch-status{display:flex;align-items:center;gap:8px;margin-top:8px}

/* ── Chapter Progress ── */
.chapter-progress{margin-bottom:12px}
.chapter-progress .cp-bar{height:4px;background:var(--border-light);border-radius:2px;overflow:hidden}
.chapter-progress .cp-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--blue));border-radius:2px;transition:width .2s ease}
.chapter-progress .cp-text{font-size:11px;color:var(--text3);margin-top:3px;text-align:right}

/* ── Outline Feedback ── */
.outline-feedback{margin-top:12px;padding:16px 20px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);display:flex;gap:8px;align-items:flex-start}
.outline-feedback textarea{flex:1;min-height:44px}

/* ── Responsive ── */
@media(max-width:800px){
  .sidebar{display:none}
  .main{padding:20px 16px 90px}
  .bottom-nav{display:flex}
  .style-grid{grid-template-columns:repeat(3,1fr)}
  .shelf-grid{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .reading-container{max-width:100%}
}

/* ── iOS 风格 ── */
[data-ui="iOS"] {
  --radius: 20px; --radius-sm: 16px; --radius-xs: 12px;
  --shadow: 0 2px 8px rgba(0,0,0,.08), 0 8px 24px rgba(0,0,0,.06);
  --font: -apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','PingFang SC','Helvetica Neue',sans-serif;
}
[data-ui="iOS"] .sidebar{display:none !important}
[data-ui="iOS"] .main{max-width:100% !important;padding:24px 20px 110px !important}
[data-ui="iOS"] .bottom-nav{display:flex !important}
[data-ui="iOS"] .bottom-nav .bn-item{font-size:10px;padding:6px 4px}
[data-ui="iOS"] .bottom-nav .bn-icon{font-size:22px}
[data-ui="iOS"] .card{border-radius:20px;padding:24px;margin-bottom:16px;border:none !important;background:var(--card)}
[data-ui="iOS"] .btn{padding:10px 22px;font-size:14px;font-weight:600;border-radius:12px}
[data-ui="iOS"] .btn-sm{padding:8px 16px;font-size:13px}
[data-ui="iOS"] .btn-xs{padding:6px 12px;font-size:12px}
[data-ui="iOS"] input, [data-ui="iOS"] textarea, [data-ui="iOS"] select{padding:12px 16px;border-radius:12px;font-size:15px}
[data-ui="iOS"] .chapter-picker .cp-btn{min-width:40px;height:36px;border-radius:10px;font-size:13px}
[data-ui="iOS"] .chapter-content{font-size:17px;line-height:2.2}
[data-ui="iOS"] .reading-container{max-width:100% !important}
[data-ui="iOS"] .book-card{border-radius:20px}
[data-ui="iOS"] .book-cover{height:120px;border-radius:20px 20px 0 0}
[data-ui="iOS"] .style-card{border-radius:14px;padding:14px}
[data-ui="iOS"] .export-item{border-radius:16px;padding:16px 20px}
[data-ui="iOS"] .chapter-outline{border-radius:16px;padding:16px 20px}
[data-ui="iOS"] .review-section{border-radius:20px;padding:20px}
[data-ui="iOS"] .create-progress{border-radius:16px;padding:18px 22px}
[data-ui="iOS"] .batch-preview{border-radius:14px}
[data-ui="iOS"] .form-row{gap:14px}

/* iOS 浅色主题 */
[data-ui="iOS"][data-theme="light"] {
  --bg: #f2f2f7; --bg2: #ffffff; --card: #ffffff; --card-hover: #f0f0f5;
  --text: #000000; --text2: #3c3c43; --text3: #aeaeb2;
  --accent: #007aff; --blue: #007aff; --green: #34c759; --red: #ff3b30;
  --border: #e5e5ea; --border-light: #f0f0f5;
  --shadow: 0 2px 8px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.04);
}

/* iOS 深色主题 */
[data-ui="iOS"][data-theme="dark"] {
  --bg: #000000; --bg2: #1c1c1e; --card: #1c1c1e; --card-hover: #2c2c2e;
  --text: #ffffff; --text2: #aeaeb2; --text3: #636366;
  --accent: #0a84ff; --blue: #0a84ff; --green: #30d158; --red: #ff453a;
  --border: #38383a; --border-light: #2c2c2e;
  --shadow: 0 2px 8px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.2);
}
</style>
</head>
<body>
<div id="app">
  <!-- Toast -->
  <div v-if="toast.visible" class="toast-overlay" @click.self="toast.visible=false">
    <div class="toast-box">
      <div class="toast-icon">{{ toast.icon || '⚠️' }}</div>
      <div class="toast-title">{{ toast.title }}</div>
      <div class="toast-body">{{ toast.message }}</div>
      <div class="toast-actions">
        <button class="btn btn-primary" @click="toast.visible=false">知道了</button>
      </div>
    </div>
  </div>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo"><span class="dot"></span>NovelGen</div>
    <nav class="sidebar-nav">
      <div class="nav-item" :class="{active:currentView==='shelf'}" @click="currentView='shelf'"><span class="nav-icon">📚</span>书架</div>
      <div class="nav-item" :class="{active:currentView==='create'}" @click="openCreate"><span class="nav-icon">✨</span>新建</div>
      <div class="nav-item" :class="{active:currentView==='create'&&activeNovel}" @click="openOutline" v-if="activeNovel"><span class="nav-icon">📋</span>修改大纲</div>
      <div class="nav-item" :class="{active:currentView==='write'}" @click="openWrite" v-if="activeNovel"><span class="nav-icon">✍️</span>写作</div>
      <div class="nav-item" :class="{active:currentView==='export'}" @click="currentView='export'"><span class="nav-icon">↗</span>导出</div>
    </nav>
    <div class="sidebar-footer">
      <div class="theme-toggle" @click="toggleTheme" :title="theme==='dark'?'切换浅色':'切换深色'">
        {{ theme === 'dark' ? '☀️' : '🌙' }}
      </div>
      <div class="theme-toggle" @click="toggleUIStyle" :title="uiStyle==='macOS'?'切换iOS风格':'切换macOS风格'" style="font-size:13px">
        {{ uiStyle === 'macOS' ? '🍎' : '📱' }}
      </div>
      v0.9 · macOS/iOS
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main">
    <!-- ====== Shelf ====== -->
    <template v-if="currentView==='shelf'">
      <div class="main-header">
        <h2>书架</h2>
        <div class="sub">{{ novels.length }} 部作品</div>
      </div>

      <div v-if="loading.shelf" class="text-center mt-24"><div class="spinner"></div></div>
      
      <div v-else-if="novels.length===0" class="empty">
        <div class="empty-icon">📚</div>
        <h3>书架空空</h3>
        <p>选择一位大师的风格，开始你的第一部作品</p>
        <button class="btn btn-primary" @click="openCreate">开始创作</button>
      </div>

      <div v-else class="shelf-grid">
        <div v-for="n in novels" :key="n.id" class="book-card" @click="openNovel(n)">
          <div class="book-cover" :style="{background:coverGradient(n.id)}">{{ n.title.slice(0,6) }}</div>
          <div class="book-info">
            <h3>{{ n.title }}</h3>
            <div class="meta">
              <span class="tag">{{ n.genre }}</span>
              <span class="tag">{{ n.style }}</span>
              <span class="badge" :class="(n.state.completed_chapters||[]).length?'badge-ok':'badge-warn'">{{ (n.state.completed_chapters||[]).length }}/{{ n.state.total_chapters }}</span>
            </div>
          </div>
          <div class="book-progress">
            <div class="progress-bar"><div class="progress-fill" :style="{width:pct(n)}"></div></div>
            <span class="progress-text">{{ pct(n) }}</span>
          </div>
        </div>
      </div>
    </template>

    <!-- ====== Create ====== -->
    <template v-if="currentView==='create'">
      <div class="main-header">
        <h2>新作品</h2>
        <div class="sub">灵感 → 世界观 → 大纲</div>
      </div>

      <div class="card">
        <div class="card-title">灵感</div>
        <div class="form-row">
          <div class="form-group"><label>题材</label><select v-model="form.genre"><option v-for="g in genres" :value="g">{{ g }}</option></select></div>
          <div class="form-group"><label>目标字数</label><select v-model="form.target_words"><option :value="10000">1万字</option><option :value="50000">5万字</option><option :value="100000">10万字</option><option :value="150000">15万字</option><option :value="200000">20万字</option><option :value="300000">30万字</option></select></div>
        </div>
        <div class="form-group"><label>书名（留空自动生成）</label><input v-model="form.title" placeholder="我在修真界写代码"></div>
        <div class="form-group"><label>核心灵感</label><textarea v-model="form.inspiration" rows="3" placeholder="用几句话描述你的故事创意，越具体效果越好…"></textarea></div>
        <!-- 命名去AI味开关 -->
        <div class="flex items-center gap-6 mt-8" style="font-size:13px;color:var(--text2)">
          <label class="toggle-switch">
            <input type="checkbox" v-model="form.naturalNames">
            <span class="toggle-slider"></span>
          </label>
          <span>自然命名 <span style="opacity:.55">（禁用"云星辰叶尘无极天帝"等AI高频词）</span></span>
        </div>
        <!-- v2.2: 节奏开关 -->
        <div class="flex items-center gap-8 mt-8" style="font-size:13px;color:var(--text2)">
          <label class="toggle-switch">
            <input type="checkbox" v-model="form.normalPacing">
            <span class="toggle-slider"></span>
          </label>
          <span>
            <span v-if="!form.normalPacing">⚡ 快节奏 <span style="opacity:.5">— 短平快，冲突密集，进展迅速</span></span>
            <span v-else>📖 正常节奏 <span style="opacity:.5">— 铺陈充分，张弛有度，细节丰富</span></span>
          </span>
        </div>
      </div>

      <!-- Style -->
      <div class="card">
        <div class="flex justify-between items-center" style="margin-bottom:16px">
          <div class="card-title" style="margin:0">风格</div>
          <div class="flex gap-6">
            <button class="btn btn-xs" :class="styleMode==='library'?'btn-primary':'btn-ghost'" @click="styleMode='library'">风格库</button>
            <button class="btn btn-xs" :class="styleMode==='params'?'btn-primary':'btn-ghost'" @click="styleMode='params';loadStyleParams()">参数化</button>
            <button class="btn btn-xs" :class="styleMode==='custom'?'btn-primary':'btn-ghost'" @click="styleMode='custom'">自由描述</button>
          </div>
        </div>

        <!-- 风格库 -->
        <template v-if="styleMode==='library'">
          <template v-for="(authors, cat) in styleCategories">
            <div class="style-cat-title">{{ cat }}</div>
            <div class="style-grid">
              <div v-for="s in authors" :key="s.name" class="style-card" :class="{active:form.style===s.name}" @click="form.style=s.name">
                <div class="sc-name">{{ s.name }}</div>
                <div class="sc-author">{{ s.author }}</div>
                <div class="sc-desc" v-if="s.desc">{{ s.desc }}</div>
              </div>
            </div>
          </template>
        </template>

        <!-- 参数化自定义 -->
        <div v-if="styleMode==='params'" class="param-panel">
          <div class="param-hint">选择各维度参数，AI 将据此生成精准匹配的风格。</div>
          <div v-for="(cfg, key) in styleParams" :key="key" class="param-group">
            <div class="param-label">{{ cfg.label }}</div>
            <div class="param-options">
              <button v-for="opt in cfg.options" :key="opt.value"
                class="param-btn" 
                :class="{active:customParams[key]===opt.value}"
                @click="customParams[key]=opt.value">
                {{ opt.label }}
              </button>
            </div>
          </div>
          <div class="param-group">
            <div class="param-label">额外关键词</div>
            <input v-model="customParams.keyword" placeholder="如：赛博朋克背景 / 带点王小波式的黑色幽默…" style="width:100%">
          </div>
          <button class="btn btn-primary w-full mt-12" @click="applyParamStyle" :disabled="isBusy">
            {{ form.style==='自定义参数化风格' ? '✓ 已应用参数化风格' : '应用参数化风格' }}
          </button>
        </div>

        <!-- 自由描述 -->
        <div v-if="styleMode==='custom'" class="mt-8">
          <textarea v-model="customStyleDesc" rows="3" placeholder="描述你想要的文笔风格…&#10;&#10;如：王小波的黑色幽默 + 村上春树的孤独感 + 中国武侠的江湖气。&#10;对话要冷幽默，描写有画面感不啰嗦，节奏快但不乱…"></textarea>
          <div class="flex gap-8 mt-8">
            <button class="btn btn-secondary btn-sm flex-1" @click="applyCustomStyle" :disabled="!customStyleDesc.trim()">{{ form.style.startsWith('自定义') && !form.style.includes('参数化') ? '✓ 已应用' : '应用此风格' }}</button>
            <button class="btn btn-ghost btn-sm" @click="saveStyleSeed" :disabled="!customStyleDesc.trim()">保存种子</button>
          </div>
          <div v-if="styleSeeds.length>0" class="mt-12">
            <div class="style-cat-title">已保存的种子</div>
            <div class="flex gap-6 flex-wrap">
              <span v-for="s in styleSeeds" :key="s.name" class="tag" style="cursor:pointer" @click="loadStyleSeed(s)">{{ s.name }}<span style="opacity:.4;margin-left:4px;cursor:pointer" @click.stop="deleteStyleSeed(s)">×</span></span>
            </div>
          </div>
        </div>
      </div>

      <div v-if="error" class="error-msg" style="cursor:pointer" @click="error=''">{{ error }} <span style="float:right;opacity:.5">✕</span></div>

      <div v-if="loading.create" class="create-progress">
        <div class="cp-bar"><div class="cp-fill" :style="{width:createProgress+'%'}"></div></div>
        <div class="cp-info"><span class="cp-label">{{ createPhaseLabel }}</span><span class="cp-pct">{{ createProgress }}%</span></div>
      </div>
      <button v-else class="btn btn-primary w-full" style="padding:12px;font-size:15px" @click="doCreate">
        生成大纲
      </button>

      <!-- v2.2: 需求拆解摘要 -->
      <div v-if="decomposeSummary" class="card" style="margin-top:12px;background:var(--bg2);border-color:var(--accent)">
        <div class="card-title" style="color:var(--accent)">📋 需求分析结果</div>
        <div style="font-size:13px;color:var(--text2);line-height:1.6">
          <div v-if="decomposeSummary.core_theme" style="margin-bottom:4px"><b>核心主题：</b>{{ decomposeSummary.core_theme }}</div>
          <div><b>拆解出 {{ decomposeSummary.subtask_count }} 条创作需求</b> · 其中 {{ decomposeSummary.p0_count }} 条为强制要求(P0)</div>
          <div v-if="decomposeSummary.summary" style="margin-top:4px;color:var(--text3)">{{ decomposeSummary.summary }}</div>
          <div v-if="decomposeSummary.offline_mode" style="margin-top:4px;color:var(--orange)">⚠️ 离线模式拆解，建议开启 LLM 以获得更精准的需求分析</div>
          <div v-if="decomposeSummary.name_warning" style="margin-top:8px;padding:8px;background:rgba(255,150,50,.1);border-radius:6px;color:var(--orange);font-size:12px;white-space:pre-wrap">
            ⚠️ 疑似角色名误写:
{{ decomposeSummary.name_warning }}
            <div style="margin-top:4px;opacity:.7">{{ decomposeSummary.name_suggestion }}</div>
          </div>
        </div>
      </div>

      <!-- Creation Result -->
      <template v-if="planResult && !loading.create">
        <div class="card mt-16">
          <div class="card-title">大纲预览</div>
          <div class="form-group"><label>书名</label><input v-model="planResult.title" style="font-size:17px;font-weight:600;text-align:center"></div>

          <!-- 大纲修改意见 — 顶部醒目位置 -->
          <div class="outline-feedback" style="background:rgba(240,136,62,.06);border-color:rgba(240,136,62,.25);margin-bottom:16px">
            <textarea v-model="outlineFeedback" rows="2" placeholder="💡 用自然语言提修改意见… 如：节奏太慢加冲突戏 / 主角性格太弱 / 加一条暗线 / 中间需要一个背叛转折" style="flex:1;min-height:52px;font-size:14px"></textarea>
            <button class="btn btn-primary btn-sm" @click="doRegenerateOutline" :disabled="isBusy || !outlineFeedback.trim()" style="flex-shrink:0;padding:8px 16px;white-space:nowrap">
              <span v-if="isRegenerating"><span class="spinner"></span></span>
              <span v-else>🔄 AI 修改大纲</span>
            </button>
          </div>
          <div v-if="isRegenerating" class="create-progress" style="margin-bottom:16px">
            <div class="cp-bar"><div class="cp-fill" :style="{width:createProgress+'%'}"></div></div>
            <div class="cp-info"><span class="cp-label">{{ createPhaseLabel }}</span><span class="cp-pct">{{ createProgress }}%</span></div>
          </div>

          <div class="mb-12"><label>世界观</label></div>
          <div class="form-group"><input v-model="planResult.worldbuilding.era" placeholder="时代背景"></div>
          <div class="form-group"><input v-model="planResult.worldbuilding.power_system" placeholder="力量体系"></div>
          <div class="form-group"><textarea v-model="planResult.worldbuilding.core_conflict" rows="2" placeholder="核心冲突"></textarea></div>

          <div class="mb-12"><label>主角</label></div>
          <div class="form-row">
            <div class="form-group"><input v-model="planResult.characters.protagonist.name" placeholder="姓名"></div>
            <div class="form-group"><input v-model="planResult.characters.protagonist.identity" placeholder="身份"></div>
          </div>
          <div class="form-group"><input v-model="planResult.characters.protagonist.cheat" placeholder="金手指"></div>
          <div class="form-group"><textarea v-model="planResult.characters.protagonist.backstory" rows="2" placeholder="背景故事"></textarea></div>

          <div class="flex justify-between items-center mb-12">
            <label style="margin:0">大纲（{{ planResult.outline?.total_chapters || 0 }}章）</label>
            <button class="btn btn-ghost btn-xs" @click="addVolume">＋ 卷</button>
          </div>
          <div v-for="(vol,vi) in planResult.outline.volumes" :key="vi" style="margin-bottom:16px;padding:14px;background:var(--bg2);border:1px solid var(--border-light);border-radius:var(--radius-xs)">
            <div class="flex gap-8 mb-8">
              <input v-model.number="vol.number" style="width:50px;text-align:center;flex-shrink:0" @change="renumberChapters">
              <input v-model="vol.title" placeholder="卷标题" class="flex-1">
              <button class="btn btn-ghost btn-xs" style="color:var(--red)" @click="removeVolume(vi)" v-if="planResult.outline.volumes.length>1">×</button>
            </div>
            <div v-for="(ch,ci) in vol.chapters" :key="ci" style="padding:6px 0;border-bottom:1px solid var(--border-light)">
              <div class="flex gap-8 items-start">
                <span style="font-size:11px;color:var(--text3);padding-top:9px;min-width:30px">Ch{{ ch.number }}</span>
                <div class="flex-1">
                  <input v-model="ch.title" placeholder="章标题" style="margin-bottom:4px;font-size:12px;padding:6px 10px">
                  <input v-model="ch.summary" placeholder="一句话摘要" style="font-size:11px;padding:5px 10px">
                </div>
                <button class="btn btn-ghost btn-xs" style="color:var(--red);margin-top:6px" @click="vol.chapters.splice(ci,1);renumberChapters()" v-if="vol.chapters.length>1">×</button>
              </div>
            </div>
            <button class="btn btn-ghost btn-xs mt-8 w-full" @click="addChapter(vol)">＋ 章节</button>
          </div>

          <div v-if="editSaved" class="success-msg">已保存</div>

          <div class="flex gap-8">
            <button class="btn btn-secondary flex-1" @click="savePlan" :disabled="loading.saving">{{ loading.saving ? '…' : '保存大纲' }}</button>
            <button class="btn btn-primary flex-1" style="padding:12px" @click="confirmAndStart">确认并开始写作</button>
          </div>
        </div>
      </template>
    </template>

    <!-- ====== Write ====== -->
    <template v-if="currentView==='write'">
      <div v-if="!activeNovel" style="text-align:center;padding:80px 20px;color:var(--text3)">
        <div style="font-size:48px;margin-bottom:16px">📝</div>
        <div style="font-size:16px;margin-bottom:8px">正在加载小说数据…</div>
        <div style="font-size:13px">如果长时间无反应，请返回书架重新打开</div>
        <button class="btn btn-ghost mt-16" @click="currentView='shelf';loadShelf()">← 返回书架</button>
      </div>
      <div v-else class="reading-container">

        <div class="flex justify-between items-center mb-12">
          <div>
            <h2 style="font-size:18px;margin:0;border:none;padding:0">{{ activeNovel.title }}</h2>
            <div class="text-xs color-text3 mt-4">
              <span class="badge badge-ok mr-8" v-if="(activeNovel.state.completed_chapters||[]).length">{{ (activeNovel.state.completed_chapters||[]).length }}章已完成</span>
              {{ activeNovel.genre }} · {{ activeNovel.style }}
            </div>
          </div>
          <button class="btn btn-ghost btn-xs" @click="openOutline" style="font-size:12px">📋 编辑大纲</button>
        </div>

        <!-- 需求管理 & 质量监督 -->
        <div class="card" style="margin-top:12px;background:var(--bg2)">
          <div class="flex justify-between items-center" style="margin-bottom:8px">
            <div class="card-title" style="margin:0;font-size:14px">🧪 需求管理 & 质量监督</div>
            <div class="flex gap-6">
              <button class="btn btn-xs btn-ghost" @click="decomposeRequirements" :disabled="isBusy">拆解需求</button>
              <button class="btn btn-xs btn-ghost" @click="superviseRequirements" :disabled="isBusy||!requirements.subtasks?.length">监督质量</button>
              <button class="btn btn-xs btn-primary" @click="runVerifyLoop" :disabled="isBusy||!requirements.subtasks?.length">🔄 循环校验</button>
            </div>
          </div>
          
          <!-- 需求拆解进度 -->
          <div v-if="requirements.subtasks?.length" class="req-list">
            <div class="req-summary" style="font-size:12px;color:var(--text3);margin-bottom:8px">
              {{ requirements.passed_count||0 }}/{{ (requirements.subtasks||[]).length }} 已通过 · 评分: {{ requirements.overall_score||'--' }}
            </div>
            <div v-for="t in (requirements.subtasks||[])" :key="t.id" class="req-item" 
                 :style="{borderLeftColor: t.status==='passed'?'#4caf50':t.status==='failed'?'#f44336':'var(--border)'}">
              <span class="req-status">{{ t.status==='passed'?'✅':t.status==='failed'?'❌':'⏳' }}</span>
              <span class="req-title" style="font-size:12px">{{ t.title?.substring(0,50) }}</span>
              <span class="req-priority" :style="{color:t.priority==='P0'?'#f44336':'var(--text3)'}">{{ t.priority }}</span>
            </div>
          </div>
          
          <!-- 监督报告 -->
          <div v-if="supervisionReport" class="supervision-report" style="margin-top:8px;padding:10px;background:var(--bg);border-radius:var(--radius-xs)">
            <div style="font-size:13px;font-weight:600;margin-bottom:4px">
              监督报告 · 评分 {{ supervisionReport.overall_score }}
              <span :style="{color:supervisionReport.overall_status==='passed'?'#4caf50':'#f44336'}">
                {{ supervisionReport.overall_status==='passed'?'✅ 全部通过':'❌ 未达标' }}
              </span>
            </div>
            <div style="font-size:11px;color:var(--text3)">{{ supervisionReport.summary_report }}</div>
          </div>
          
          <!-- 新需求输入 -->
          <div v-if="showReqInput" style="margin-top:8px;display:flex;gap:8px">
            <input v-model="reqInspiration" placeholder="输入追加需求…" style="flex:1;font-size:12px;padding:6px 10px">
            <button class="btn btn-xs btn-ghost" @click="addRequirements" :disabled="!reqInspiration.trim()">追加</button>
          </div>
          <button v-else class="btn btn-ghost btn-xs" style="margin-top:4px;font-size:11px" @click="showReqInput=true">+ 追加需求</button>
        </div>

        <!-- 大纲修改意见 — 紧凑行 -->
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:8px 12px;background:rgba(240,136,62,.06);border:1px solid rgba(240,136,62,.15);border-radius:8px">
          <span style="font-size:12px;color:var(--accent);white-space:nowrap;font-weight:600">💡 修改大纲</span>
          <input v-model="outlineFeedback" placeholder="如：加感情线 / 中间需要转折…" style="flex:1;min-width:0;padding:6px 10px;font-size:13px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text)">
          <button class="btn btn-primary btn-xs" @click="doRegenerateOutline" :disabled="isBusy || !outlineFeedback.trim()" style="padding:5px 12px;font-size:12px;white-space:nowrap">
            <span v-if="isRegenerating"><span class="spinner"></span></span>
            <span v-else>🔄 执行</span>
          </button>
        </div>
        <div v-if="isRegenerating" class="create-progress mb-12">
          <div class="cp-bar"><div class="cp-fill" :style="{width:createProgress+'%'}"></div></div>
          <div class="cp-info"><span class="cp-label">{{ createPhaseLabel }}</span><span class="cp-pct">{{ createProgress }}%</span></div>
        </div>

        <div class="chapter-picker">
          <div v-for="ch in availableChapters" :key="ch" class="cp-btn" :class="{active:ch===writing.chapter, done:(activeNovel.state.completed_chapters||[]).includes(ch)}" @click="!isBusy && selectChapter(ch)" :style="isBusy?{opacity:.4,cursor:'not-allowed'}:{}">{{ ch }}</div>
        </div>

        <div v-if="currentOutline" class="chapter-outline">
          <div class="co-label">大纲</div>
          <div class="co-title">{{ currentOutline.title }}</div>
          <div class="co-summary">{{ currentOutline.summary }}</div>
          <div class="co-meta"><span>🎭 {{ currentOutline.emotion_curve }}</span><span>👤 {{ (currentOutline.characters||[]).join('、') }}</span></div>
        </div>

        <button class="btn btn-primary mb-12" style="padding:10px 24px;font-size:14px" v-if="!writing.done && !(activeNovel.state.completed_chapters||[]).includes(writing.chapter)" @click="doGenerateChapter" :disabled="isBusy">
          <span v-if="loading.write"><span class="spinner"></span> 写作中…</span>
          <span v-else-if="loading.batch">⏳ 批量中…</span>
          <span v-else>✍️ 生成第{{ writing.chapter }}章</span>
        </button>

        <!-- 单章进度条 -->
        <div v-if="loading.write && writing.content" class="chapter-progress">
          <div class="cp-bar"><div class="cp-fill" :style="{width:chapterProgress+'%'}"></div></div>
          <div class="cp-text">{{ chapterProgressLabel || chapterProgress+'%' }}</div>
        </div>

        <!-- 批量生成 -->
        <div class="card mb-16" style="padding:12px 16px">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
            <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)">
              <span>批量：从</span>
              <input v-model.number="batchStart" type="number" min="1" :max="activeNovel.state.total_chapters" :disabled="isBusy" style="width:50px;padding:4px 6px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);font-size:13px;text-align:center">
              <span>到 {{ batchEnd - batchStart + 1 > 10 ? '(最多10章)' : '' }}</span>
              <input v-model.number="batchEnd" type="number" min="1" :max="Math.min(activeNovel.state.total_chapters, batchStart + 9)" :disabled="isBusy" style="width:50px;padding:4px 6px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);font-size:13px;text-align:center">
            </div>
            <div style="display:flex;gap:6px">
              <button v-if="loading.batch" class="btn btn-sm" style="background:var(--red);color:#fff" @click="cancelBatch">⏹ 中断</button>
              <button v-else class="btn btn-secondary btn-sm" @click="doBatchGenerate" :disabled="isBusy">📦 批量生成</button>
            </div>
          </div>
          <div v-if="loading.batch" style="margin-top:8px">
            <div class="batch-status"><div class="progress-bar" style="flex:1"><div class="progress-fill" :style="{width:batchProgress+'%'}"></div></div><span class="progress-text" style="margin-left:8px">{{ batchCurrent }}/{{ batchEnd }} ({{ batchProgress }}%)</span></div>
            <div v-if="batchStreaming" class="batch-preview">{{ batchStreaming.slice(-300) }}</div>
          </div>
        </div>

        <!-- 写作模式切换 -->
        <div class="mb-16" style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);justify-content:center">
          <span>🐉 网文</span>
          <label class="toggle-switch">
            <input type="checkbox" v-model="writingModeLiterary" @change="onModeChange">
            <span class="toggle-slider"></span>
          </label>
          <span>📖 文学</span>
        </div>

        <div v-if="writing.content" class="chapter-content" ref="preview">{{ writing.content }}</div>
        <div v-else-if="!loading.write && (activeNovel.state.completed_chapters||[]).includes(writing.chapter) && writing.done" class="chapter-empty">
          <div class="ce-icon">☐</div><p>第{{ writing.chapter }}章</p><p class="text-xs color-text3 mt-8">点击章节序号查看</p>
        </div>

        <div v-if="loading.write && !writing.content" class="text-center" style="padding:60px 20px"><div class="spinner" style="width:28px;height:28px"></div><p class="color-text2 mt-16 text-sm">写作中…</p></div>

        <div v-if="writing.done" class="flex gap-8 justify-center mt-24 mb-16">
          <button class="btn btn-primary" @click="nextChapter">下一章</button>
          <button class="btn btn-secondary" @click="copyChapter">复制</button>
        </div>

        <!-- 意见重生成 -->
        <div v-if="writing.done" class="review-section">
          <div class="rs-title">💬 对本章不满意？输入修改意见重新生成（大纲和结构不变）</div>
          <textarea v-model="reviewFeedback" rows="2" placeholder="如：对话太少 / 节奏太慢 / 冲突感不够强 / 描写不够细致…"></textarea>
          <button class="btn btn-secondary btn-sm" @click="doRegenerate" :disabled="loading.write || !reviewFeedback.trim()">
            <span v-if="loading.write"><span class="spinner"></span> 重写中…</span>
            <span v-else>🔄 按意见重新生成</span>
          </button>
          <span class="text-xs color-text3 ml-8">大纲、角色、节拍结构均保持不变</span>
        </div>

        <div v-if="error" class="error-msg" style="cursor:pointer" @click="error=''">{{ error }} <span style="float:right;opacity:.5">✕</span></div>
      </div>
    </template>

    <!-- ====== Export ====== -->
    <template v-if="currentView==='export'">
      <div class="main-header">
        <h2>导出</h2>
        <div class="sub">{{ novels.length }} 部作品 · 单本或批量导出 TXT/PDF</div>
      </div>

      <div class="card">
        <div class="export-list">
          <div v-for="n in novels" :key="n.id" class="export-item">
            <div class="export-check" :class="{checked:exportSelected[n.id]}" @click="toggleExport(n.id)"></div>
            <div class="ei-info">
              <div class="ei-title">{{ n.title }}</div>
              <div class="ei-meta">{{ n.genre }} · {{ n.style }} · {{ (n.state.completed_chapters||[]).length }}/{{ n.state.total_chapters }}章</div>
            </div>
            <div class="ei-actions">
              <button class="btn btn-ghost btn-xs" @click="doSingleExport(n,'txt')" :disabled="loading.export===n.id+'txt'">{{ loading.export===n.id+'txt' ? '…' : 'TXT' }}</button>
              <button class="btn btn-ghost btn-xs" @click="doSingleExport(n,'pdf')" :disabled="loading.export===n.id+'pdf'">{{ loading.export===n.id+'pdf' ? '…' : 'PDF' }}</button>
            </div>
          </div>
        </div>

        <div v-if="novels.length===0" class="text-center color-text3 text-sm" style="padding:30px">还没有小说</div>

        <div class="export-actions" v-if="selectedCount>0">
          <button class="btn btn-secondary flex-1" @click="doBatchExport()" :disabled="loading.export">
            <span v-if="loading.export==='batch'"><span class="spinner"></span></span>
            批量下载 ({{ selectedCount }}本)
          </button>
        </div>
        <div v-if="loading.export==='batch'" style="margin-top:8px">
          <div class="progress-bar"><div class="progress-fill" :style="{width:exportProgress+'%'}"></div></div>
        </div>
        <button class="btn btn-ghost btn-sm mt-8" @click="selectAll" v-if="novels.length">{{ allSelected ? '取消全选' : '全选' }}</button>
      </div>

      <div v-if="error" class="error-msg" style="cursor:pointer" @click="error=''">{{ error }} <span style="float:right;opacity:.5">✕</span></div>
    </template>
  </main>

  <!-- Mobile Bottom Nav -->
  <nav class="bottom-nav">
    <div class="bn-item" :class="{active:currentView==='shelf'}" @click="currentView='shelf'"><span class="bn-icon">📚</span>书架</div>
    <div class="bn-item" :class="{active:currentView==='create'}" @click="openCreate"><span class="bn-icon">✨</span>新建</div>
    <div class="bn-item" :class="{active:currentView==='create'&&activeNovel}" @click="openOutline" v-if="activeNovel"><span class="bn-icon">📋</span>修改大纲</div>
    <div class="bn-item" :class="{active:currentView==='write'}" @click="openWrite" v-if="activeNovel"><span class="bn-icon">✍️</span>写作</div>
    <div class="bn-item" :class="{active:currentView==='export'}" @click="currentView='export'"><span class="bn-icon">↗</span>导出</div>
    <div class="bn-item" @click="toggleTheme"><span class="bn-icon">{{ theme==='dark'?'☀️':'🌙' }}</span>主题</div>
    <div class="bn-item" @click="toggleUIStyle"><span class="bn-icon">{{ uiStyle==='macOS'?'📱':'🍎' }}</span>风格</div>
  </nav>
</div>

<script>
const API = window.location.origin;
const { createApp, ref, reactive, computed, watch, nextTick, onMounted } = Vue;

createApp({
  setup() {
    const currentView = ref('shelf');
    const novels = ref([]); const activeNovel = ref(null);
    const planResult = ref(null); const error = ref(''); const preview = ref(null);
    const toast = reactive({ visible:false, title:'', message:'', icon:'⚠️' });
    const abortCtrl = ref(null);
    const styleCategories = ref({}); const exportSelected = reactive({});
    const editSaved = ref(false); const styleMode = ref('library');
    const customStyleDesc = ref(''); const styleSeeds = ref([]);
    const styleParams = ref({
      narrative_person:{label:'叙事人称',options:[
        {value:'first',label:'第一人称（我）'},{value:'third_limited',label:'第三人称限知'},{value:'third_omniscient',label:'第三人称全知'}
      ]},
      tone:{label:'文风基调',options:[
        {value:'hot_blood',label:'热血昂扬'},{value:'calm',label:'冷静克制'},{value:'humorous',label:'幽默轻松'},{value:'dark',label:'暗黑沉重'},{value:'warm',label:'温馨治愈'}
      ]},
      pacing:{label:'节奏控制',options:[
        {value:'fast',label:'快节奏'},{value:'balanced',label:'张弛有度'},{value:'slow',label:'舒缓细腻'}
      ]},
      dialogue_ratio:{label:'对话比例',options:[
        {value:'low',label:'少对话'},{value:'medium',label:'叙事对话均衡'},{value:'high',label:'对话驱动'}
      ]},
      description_density:{label:'描写密度',options:[
        {value:'sparse',label:'简洁留白'},{value:'moderate',label:'适中'},{value:'rich',label:'浓墨重彩'}
      ]},
      emotion_tendency:{label:'情感倾向',options:[
        {value:'positive',label:'积极向上'},{value:'bittersweet',label:'悲喜交加'},{value:'tragic',label:'悲剧底色'},{value:'neutral',label:'冷静旁观'}
      ]},
      length_preference:{label:'篇幅偏好',options:[
        {value:'short',label:'短篇精炼'},{value:'medium',label:'中篇展开'},{value:'long',label:'长篇铺陈'}
      ]}
    }); const customParams = reactive({
      narrative_person:'third_limited', tone:'hot_blood', pacing:'balanced',
      dialogue_ratio:'medium', description_density:'moderate',
      emotion_tendency:'positive', length_preference:'medium', keyword:''
    });
    const requirements = reactive({subtasks:[]}); const reqInspiration = ref(''); const showReqInput = ref(false);
    const supervisionReport = ref(null);
    const theme = ref(localStorage.getItem('theme') || 'dark');
    const uiStyle = ref(localStorage.getItem('uiStyle') || 'macOS');
    const createProgress = ref(0); const createPhase = ref(''); const createPhaseLabel = ref('');
    const decomposeSummary = ref(null);  // v2.2: 需求拆解摘要
    const reviewFeedback = ref(''); const batchStreaming = ref('');
    const chapterProgress = ref(0); const chapterProgressLabel = ref('');
    const outlineFeedback = ref(''); const isRegenerating = ref(false);
    
    // ── 全局状态锁：任何生成操作进行时阻断其他操作 ──
    const isBusy = computed(() => loading.create || loading.write || loading.batch || isRegenerating.value);
    
    // ── SSE 安全读取器（含超时保护）──
    /* ── 错误弹窗 ── */
    function showToast(msg, title='提示', icon='⚠️') {
      toast.title = title; toast.message = msg; toast.icon = icon; toast.visible = true;
    }
    function reportError(msg, title='操作异常') {
      error.value = msg; showToast(msg, title, '⚠️');
    }

    async function readSSE(response, onEvent, timeoutMs = 300000) {
      const reader = response.body.getReader();
      const dec = new TextDecoder();
      let buf = '';
      let lastData = Date.now();
      const timeoutCheck = setInterval(() => {
        if (Date.now() - lastData > 60000) {
          reader.cancel('SSE timeout');
          clearInterval(timeoutCheck);
        }
      }, 5000);
      
      try {
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          lastData = Date.now();
          buf += dec.decode(value, { stream: true });
          const lines = buf.split('\n');
          buf = lines.pop() || '';
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            try {
              const evt = JSON.parse(line.slice(6));
              if (evt.type === 'ping') continue; // Render心跳，忽略
              if (onEvent(evt) === false) { reader.cancel(); break; }
            } catch (_) {}
          }
        }
      } finally {
        clearInterval(timeoutCheck);
        try { reader.releaseLock(); } catch (_) {}
      }
    }

    const form = reactive({ genre:'修仙', style:'热血爽文', inspiration:'', target_words:500000, title:'', naturalNames:true, normalPacing:false });
    const loading = reactive({ shelf:false, create:false, write:false, export:false, saving:false, batch:false });
    const writingModeLiterary = ref(false);
    const writing = reactive({ chapter:1, content:'', done:false });

    const batchStart = ref(1); const batchEnd = ref(1);
    // 批量上限自动裁剪：batchStart 变化时 clamp batchEnd
    watch(batchStart, (v) => {
      const maxEnd = (v||1) + 9;
      if (batchEnd.value > maxEnd) batchEnd.value = maxEnd;
    });
    const batchProgress = ref(0); const batchCurrent = ref(0);
    const exportProgress = ref(0);

    const genres = ['修仙','玄幻','都市','科幻','悬疑','历史','游戏','末日','无限流','武侠','克苏鲁','赛博朋克'];

    const selectedCount = computed(() => Object.values(exportSelected).filter(Boolean).length);
    const allSelected = computed(() => novels.value.length>0 && novels.value.every(n=>exportSelected[n.id]));
    const availableChapters = computed(() => activeNovel.value ? Array.from({length:activeNovel.value.state.total_chapters||20},(_,i)=>i+1) : []);
    const currentOutline = computed(() => {
      if (!activeNovel.value||!planResult.value) return null;
      for (const vol of planResult.value.outline?.volumes||[]) for (const ch of vol.chapters||[]) if (ch.number===writing.chapter) return ch;
      return null;
    });

    function pct(n) { const t=n.state.total_chapters||1,c=(n.state.completed_chapters||[]).length; return Math.round(c/t*100)+'%'; }
    function fmtWords(w) { return w>=10000?(w/10000).toFixed(0)+'万字':w+'字'; }
    function coverGradient(id) {
      const c=[['#1a1a2e','#16213e'],['#0f3460','#533483'],['#1b4332','#2d6a4f'],['#3d2c2e','#6b4c3b'],['#1c2541','#3a506b']];
      const [a,b]=c[(id||'').split('').reduce((a,c)=>a+c.charCodeAt(0),0)%c.length];
      return `linear-gradient(135deg,${a},${b})`;
    }

    onMounted(async () => {
      applyAppearance();
      loadStyles(); loadStyleSeeds(); // fire-and-forget
      // 书架加载（带重试，Render冷启动需要等服务器醒来）
      loading.shelf = true;
      for (let attempt=0; attempt<3; attempt++) {
        const ok = await _loadShelfOnce();
        if (ok) break;
        if (attempt < 2) await new Promise(r => setTimeout(r, 2000));
      }
      loading.shelf = false;
      // 恢复上次session — 两步兜底：
      //   1) 书架里找（最优，带完整 state）
      //   2) 书架没找到/加载失败 → 直接用 sessionStorage 的 ID 去 API 拿
      const savedId = sessionStorage.getItem('activeNovelId');
      const savedView = sessionStorage.getItem('lastView');
      if (savedId) {
        let novel = novels.value.find(n => n.id === savedId);
        if (novel) {
          // 书架里找到了 → 直接恢复
          _restoreSession(novel, savedView);
        } else if (novels.value.length > 0) {
          // 书架有数据但没找到 → 可能是 ID 不匹配，静默忽略
          console.warn('Saved novel not in shelf, clearing session');
          sessionStorage.removeItem('activeNovelId');
          sessionStorage.removeItem('lastView');
        } else {
          // 书架为空（API 挂了）→ 兜底：直接 fetch 小说数据
          console.log('Shelf empty, fallback fetch for session restore');
          try {
            const r = await fetch(API+'/api/novels/'+encodeURIComponent(savedId));
            if (r.ok) {
              const d = await r.json();
              if (d.novel) {
                // 用 API 返回的数据构造最小 novel 对象
                const st = d.novel.state || {};
                novel = {
                  id: d.novel.title || savedId,
                  title: d.novel.title || savedId,
                  genre: d.novel.genre || '',
                  style: d.novel.style || '',
                  state: { total_chapters: st.total_chapters||1, completed_chapters: st.completed_chapters||[], current_chapter: st.current_chapter||0 }
                };
                novels.value = [novel]; // 顺手填充书架
                planResult.value = d.novel;
                _restoreSession(novel, savedView, true);
              }
            }
          } catch(e) {
            console.warn('Fallback session restore failed:', e.message);
          }
        }
      }
    });

    function applyAppearance() {
      document.documentElement.setAttribute('data-theme', theme.value);
      document.documentElement.setAttribute('data-ui', uiStyle.value);
      const isLight = theme.value === 'light';
      const isIOS = uiStyle.value === 'iOS';
      document.querySelector('meta[name="theme-color"]').setAttribute('content', isLight ? (isIOS ? '#f2f2f7' : '#f5f5f7') : (isIOS ? '#000000' : '#0d1117'));
      document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]').setAttribute('content', isLight ? 'default' : 'black-translucent');
      localStorage.setItem('theme', theme.value);
      localStorage.setItem('uiStyle', uiStyle.value);
    }
    function toggleTheme() { theme.value = theme.value === 'dark' ? 'light' : 'dark'; applyAppearance(); }
    function toggleUIStyle() { uiStyle.value = uiStyle.value === 'macOS' ? 'iOS' : 'macOS'; applyAppearance(); }

    // 刷新恢复：保存当前小说和视图到 sessionStorage
    function _restoreSession(novel, savedView, skipPlanFetch) {
      activeNovel.value = novel;
      if (!skipPlanFetch) {
        fetch(API+'/api/novels/'+encodeURIComponent(novel.id))
          .then(r=>r.json()).then(d=>{planResult.value=d.novel;}).catch(()=>{});
      }
      if (savedView && ['create','write'].includes(savedView)) {
        currentView.value = savedView;
        const done = (novel.state.completed_chapters||[]);
        const total = novel.state.total_chapters||1;
        let next = 1; while(next<=total && done.includes(next)) next++;
        writing.chapter = Math.min(next, total);
        if (done.includes(writing.chapter)) {
          fetch(API+'/api/novels/'+encodeURIComponent(novel.id)+'/chapters/'+writing.chapter)
            .then(r=>r.ok?r.json():null)
            .then(d=>{if(d&&d.content){writing.content=d.content;writing.done=true;}})
            .catch(()=>{});
        }
      }
    }
    function _saveSession() {
      if (activeNovel.value) {
        sessionStorage.setItem('activeNovelId', activeNovel.value.id);
        sessionStorage.setItem('lastView', currentView.value);
      }
    }

    async function loadStyles() { try { const r=await fetch(API+'/api/styles'); styleCategories.value=(await r.json()).categories||{}; } catch(e){} }
    let _shelfDebounce=null;
    async function _loadShelfOnce() {
      // 内部fetch，返回true/false，失败不覆盖已有数据
      try {
        const r = await fetch(API+'/api/novels');
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const data = await r.json();
        const list = data.novels || [];
        // 仅在成功且有数据时更新（或首次加载）
        if (list.length > 0 || novels.value.length === 0) {
          novels.value = list;
        }
        if (activeNovel.value && list.length > 0) {
          const updated = list.find(n => n.id === activeNovel.value.id);
          if (updated) activeNovel.value = updated;
        }
        return true;
      } catch(e) {
        console.warn('Shelf fetch retry:', e.message);
        return false;
      }
    }
    async function loadShelf() {
      if (_shelfDebounce) { clearTimeout(_shelfDebounce); _shelfDebounce=null; }
      if (!loading.shelf && novels.value.length === 0) loading.shelf = true;
      await _loadShelfOnce();
      loading.shelf = false;
    }
    function loadShelfDebounced() {
      if (_shelfDebounce) return;
      _shelfDebounce = setTimeout(() => { _shelfDebounce=null; loadShelf(); }, 500);
    }
    function loadNovelPlan() {
      // 从服务端强制重拉最新 plan（主角修改后确保前端同步）
      if (!activeNovel.value) return;
      fetch(API+'/api/novels/'+encodeURIComponent(activeNovel.value.id))
        .then(r=>r.json()).then(d=>{
          if (d.novel) {
            // 用 nextTick 确保 Vue 响应式触发
            planResult.value = null;
            setTimeout(() => { planResult.value = d.novel; }, 50);
          }
        })
        .catch(()=>{});
    }
    function openCreate() { if(isBusy.value) return; planResult.value=null; decomposeSummary.value=null; error.value=''; currentView.value='create'; }
    function openWrite() { if(isBusy.value) return; if(activeNovel.value) { currentView.value='write'; _saveSession(); } }
    function openOutline() {
      if(isBusy.value) return;
      if(!activeNovel.value) return;
      _saveSession();
      // 从服务端重新加载plan（保留最新版本）
      fetch(API+'/api/novels/'+encodeURIComponent(activeNovel.value.id))
        .then(r=>r.json()).then(d=>{planResult.value=d.novel;})
        .catch(()=>{});
      currentView.value='create';
    }

    async function doCreate() {
      if (!form.inspiration.trim()) { reportError('请输入核心灵感'); return; }
      if (loading.write || loading.batch) { reportError('有任务正在进行中，请等待完成'); return; }
      error.value=''; planResult.value=null; loading.create=true;
      createProgress.value=0; createPhase.value='start'; createPhaseLabel.value='准备中…';
      decomposeSummary.value=null;
      try {
        const r=await fetch(API+'/api/novels/create-stream',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...form, natural_names:form.naturalNames, normal_pacing:form.normalPacing})});
        await readSSE(r, (evt) => {
          if(evt.type==='progress'){ createPhase.value=evt.phase; createPhaseLabel.value=evt.label; createProgress.value=evt.pct; }
          // v2.2: 需求拆解完成
          else if(evt.type==='requirements_decomposed'){ 
            decomposeSummary.value=evt;
            createPhaseLabel.value=`已分析出 ${evt.subtask_count} 条创作需求`;
          }
          else if(evt.type==='warning'){ showToast(evt.message, '提示', 'ℹ️'); }
          // v2.2: 角色名一致性警告
          else if(evt.type==='name_check'){ 
            decomposeSummary.value = { ...decomposeSummary.value, name_warning: evt.mismatches, name_suggestion: evt.suggestion };
          }
          else if(evt.type==='done'){ createProgress.value=100; createPhaseLabel.value='完成！'; planResult.value=evt.plan; loadShelfDebounced(); _saveSession(); }
          else if(evt.type==='error'){ reportError(evt.message, '生成失败'); return false; }
        });
      } catch(e){ if(e.name!=='AbortError') reportError(e.message||'连接超时，请重试'); }
      loading.create=false;
    }

    function openNovel(novel) {
      if(isBusy.value){ showToast('有任务正在进行中，请等待完成'); return; }
      activeNovel.value=novel; error.value='';
      _saveSession();
      const done=(novel.state.completed_chapters||[]), total=novel.state.total_chapters||1;
      planResult.value=null;
      let next=1; while(next<=total && done.includes(next)) next++;
      writing.chapter=Math.min(next, total); writing.content=''; writing.done=false;
      currentView.value='write';
      batchStart.value=Math.min(next, total); batchEnd.value=Math.min(total, next+9);
      // 异步加载plan和章节内容
      fetch(API+'/api/novels/'+encodeURIComponent(novel.id))
        .then(r=>r.json()).then(d=>{planResult.value=d.novel;})
        .catch(()=>{});
      // 如果默认章节已生成，加载内容
      const defaultCh = Math.min(next, total);
      if (done.includes(defaultCh)) {
        fetch(API+'/api/novels/'+encodeURIComponent(novel.id)+'/chapters/'+defaultCh)
          .then(r=>r.ok?r.json():null)
          .then(d=>{if(d&&d.content){writing.content=d.content;writing.done=true;}})
          .catch(()=>{});
      }
    }
    function startWriting(title) { 
      const n = novels.value.find(x => x.id === title || x.title === title); 
      if (n) { openNovel(n); return; }
      
      // 列表没刷新 — 用 planResult 跳转
      const plan = planResult.value;
      if (plan && (plan.title === title || title === undefined)) {
        activeNovel.value = {
          id: plan.title,
          title: plan.title,
          genre: plan.genre || '',
          style: plan.style || '',
          state: plan.state || { total_chapters: plan.outline?.total_chapters || 1, completed_chapters: [] }
        };
        currentView.value = 'write';
        loadShelf();
        _saveSession();
        return;
      }
      
      // 最后兜底：直接 fetch
      if (title) {
        fetch(API+'/api/novels/'+encodeURIComponent(title))
          .then(r=>r.json()).then(d=>{
            if (d.novel) openNovel({...d.novel, id: title, state: d.novel.state||{}});
          }).catch(()=>{});
      }
    }

    let _chFetchAbort=null;
    function selectChapter(ch, skipFetch) {
      if(isBusy.value) return;
      writing.chapter=ch; writing.content=''; writing.done=false; error.value='';
      // 取消进行中的请求
      if (_chFetchAbort) { _chFetchAbort.abort(); _chFetchAbort=null; }
      if (skipFetch) return;
      if(!activeNovel.value) return;
      const done=activeNovel.value.state.completed_chapters||[];
      if(!done.includes(ch)) return;
      const ctrl=new AbortController(); _chFetchAbort=ctrl;
      fetch(API+'/api/novels/'+encodeURIComponent(activeNovel.value.id)+'/chapters/'+ch, {signal:ctrl.signal})
        .then(r=>r.ok?r.json():null)
        .then(d=>{if(d&&d.content){writing.content=d.content;writing.done=true;}})
        .catch(()=>{})
        .finally(()=>{if(_chFetchAbort===ctrl) _chFetchAbort=null;});
    }

    async function doGenerateChapter() {
      if(!activeNovel.value) return;
      if(isBusy.value){ reportError('有任务正在进行中，请等待完成'); return; }
      if((activeNovel.value.state.completed_chapters||[]).includes(writing.chapter)) return;
      loading.write=true; writing.content=''; writing.done=false; reviewFeedback.value=''; error.value='';
      chapterProgress.value=0; chapterProgressLabel.value='准备中…';
      const targetChars = (currentOutline.value?.target_words || 3000) * 2;
      try {
        const r=await fetch(API+'/api/novels/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({novel_id:activeNovel.value.id,chapter_num:writing.chapter,writing_mode:writingModeLiterary.value?'literary':'webnovel'})});
        await readSSE(r, (evt) => {
          if(evt.type==='text'){
            writing.content+=evt.content; chapterProgress.value=Math.min(95, Math.round(writing.content.length/targetChars*100));
            chapterProgressLabel.value=`${writing.content.length}字`;
            nextTick(()=>{if(preview.value)preview.value.scrollTop=preview.value.scrollHeight});
          }
          else if(evt.type==='done'){
            writing.done=true; chapterProgress.value=100; chapterProgressLabel.value='完成';
            const ch=activeNovel.value.state; if(!ch.completed_chapters) ch.completed_chapters=[];
            if(!ch.completed_chapters.includes(evt.chapter_num)) ch.completed_chapters.push(evt.chapter_num);
            ch.completed_chapters.sort((a,b)=>a-b); ch.current_chapter=Math.max(...ch.completed_chapters);
            loadShelfDebounced();
          }
          else if(evt.type==='error'){ reportError(evt.message, '生成失败'); return false; }
        });
      } catch(e){ if(e.name!=='AbortError') reportError(e.message||'连接超时，请重试'); }
      loading.write=false; chapterProgress.value=0;
    }
    function nextChapter() { const n=writing.chapter+1; if(n<=(activeNovel.value?.state.total_chapters||999)) selectChapter(n); }
    function copyChapter() { navigator.clipboard.writeText(writing.content); showToast('已复制到剪贴板', '操作成功', '✅'); }

    function cancelBatch() {
      if(abortCtrl.value){ abortCtrl.value.abort(); abortCtrl.value=null; }
      loading.batch=false; batchStreaming.value=''; writing.done=true;
      showToast('已中断，已生成的章节保留', '批量生成中断', '⏸');
    }

    async function doBatchGenerate() {
      if(!activeNovel.value||loading.batch) return;
      if(isBusy.value){ reportError('有任务正在进行中，请等待完成'); return; }
      const start=batchStart.value||1, end=batchEnd.value||1;
      if(start>end) return;
      const count = end - start + 1;
      if(count > 10) { reportError('批量生成上限为10章，请缩小范围'); return; }
      loading.batch=true; batchProgress.value=0; batchCurrent.value=start-1; error.value=''; batchStreaming.value='';
      const ctrl=new AbortController(); abortCtrl.value=ctrl;
      let failedChapters = [];
      try {
        const r=await fetch(API+'/api/novels/'+encodeURIComponent(activeNovel.value.id)+'/generate/batch',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({start_chapter:start,end_chapter:end,writing_mode:writingModeLiterary.value?'literary':'webnovel'}),
          signal:ctrl.signal,
        });
        await readSSE(r, (evt) => {
          if(evt.type==='progress'){
            writing.chapter=evt.chapter; writing.content=''; writing.done=false;
            batchCurrent.value=evt.chapter-1; batchProgress.value=Math.round((evt.chapter-1-start)/(end-start)*100);
          }
          else if(evt.type==='text'){
            writing.content+=evt.content;
            batchStreaming.value=(batchStreaming.value+evt.content).slice(-300);
            nextTick(()=>{if(preview.value)preview.value.scrollTop=preview.value.scrollHeight});
          }
          else if(evt.type==='chapter_done'){
            writing.done=true;
            const st=activeNovel.value.state;
            if(!st.completed_chapters) st.completed_chapters=[];
            if(!st.completed_chapters.includes(evt.chapter)) st.completed_chapters.push(evt.chapter);
            st.completed_chapters.sort((a,b)=>a-b);
            st.current_chapter=Math.max(...st.completed_chapters);
            batchCurrent.value=evt.chapter; batchProgress.value=Math.round((evt.chapter-start+1)/(end-start+1)*100);
            batchStreaming.value=''; loadShelfDebounced();
          }
          else if(evt.type==='chapter_failed'){
            failedChapters.push(evt.chapter);
            batchCurrent.value=evt.chapter; batchProgress.value=Math.round((evt.chapter-start+1)/(end-start+1)*100);
            batchStreaming.value='';
          }
          else if(evt.type==='batch_done'){
            batchCurrent.value=end; batchProgress.value=100;
            if((evt.failed||[]).length>0) reportError(`${evt.failed.length}章失败: ${evt.failed.join(',')}`, '批量生成部分失败');
          }
          else if(evt.type==='error'){ reportError(evt.message, '生成失败'); return false; }
        });
        selectChapter(end); loadShelfDebounced();
      } catch(e){ if(e.name!=='AbortError') error.value=e.message||'连接超时，已生成的部分已保存'; }
      loading.batch=false; abortCtrl.value=null; batchStreaming.value='';
    }

    async function doRegenerate() {
      if(!activeNovel.value||!reviewFeedback.value.trim()){ error.value='请输入修改意见'; return; }
      if(loading.batch){ error.value='批量生成运行中，请等待完成'; return; }
      loading.write=true; writing.content=''; writing.done=false; error.value=''; chapterProgress.value=0;
      try {
        const r=await fetch(API+'/api/novels/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({novel_id:activeNovel.value.id,chapter_num:writing.chapter,writing_mode:writingModeLiterary.value?'literary':'webnovel',feedback:reviewFeedback.value.trim()})});
        await readSSE(r, (evt) => {
          if(evt.type==='text'){ writing.content+=evt.content; nextTick(()=>{if(preview.value)preview.value.scrollTop=preview.value.scrollHeight}); }
          else if(evt.type==='done'){ writing.done=true; reviewFeedback.value=''; chapterProgress.value=100; }
          else if(evt.type==='error'){ reportError(evt.message, '生成失败'); return false; }
        });
      } catch(e){ if(e.name!=='AbortError') reportError(e.message||'连接超时，请重试'); }
      loading.write=false; chapterProgress.value=0;
    }

    async function doRegenerateOutline() {
      const novelId = planResult.value?.title || activeNovel.value?.id;
      if(!novelId || !outlineFeedback.value.trim()){ error.value='请输入修改意见'; return; }
      if(isBusy.value){ error.value='有任务正在进行中'; return; }
      isRegenerating.value=true; error.value=''; createPhaseLabel.value='正在分析修改意见…'; createProgress.value=5;
      try {
        const r=await fetch(API+'/api/novels/'+encodeURIComponent(novelId)+'/interactive-outline',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({feedback:outlineFeedback.value.trim()})});
        await readSSE(r, (evt) => {
          if(evt.type==='progress'){ createPhase.value=evt.phase; createPhaseLabel.value=evt.label; createProgress.value=evt.pct; }
          else if(evt.type==='intent'){ createPhaseLabel.value='已理解: '+evt.summary?.substring(0,50); }
          else if(evt.type==='execution_summary'){ createPhaseLabel.value=`完成 ${evt.executed}/${evt.total} 条修改`; }
          else if(evt.type==='diff'){ createPhaseLabel.value=`共 ${(evt.changes||[]).length} 处变更`; }
          else if(evt.type==='done'){ createProgress.value=100; createPhaseLabel.value='完成'; planResult.value=evt.plan; outlineFeedback.value=''; loadShelfDebounced(); loadNovelPlan(); }
          else if(evt.type==='error'){ reportError(evt.message, '生成失败'); return false; }
        });
      } catch(e){ if(e.name!=='AbortError')error.value=e.message||'连接超时'; }
      isRegenerating.value=false; createProgress.value=0;
    }
    function onModeChange() { /* toggle handled by v-model, just reset writing state */ }

    function toggleExport(id) { exportSelected[id]=!exportSelected[id]; }
    function selectAll() { const v=!allSelected.value; novels.value.forEach(n=>exportSelected[n.id]=v); }
    async function doSingleExport(novel, fmt='txt') {
      loading.export=novel.id+fmt; error.value='';
      try {
        const r=await fetch(API+'/api/novels/'+encodeURIComponent(novel.id)+'/export?fmt='+fmt);
        if(!r.ok) throw new Error((await r.json().catch(()=>({detail:'无章节'}))).detail);
        if(fmt==='pdf'){ downloadBlob(await r.blob(), novel.id+'.pdf', false, 'application/pdf'); }
        else downloadBlob(await r.text(), novel.id+'.txt');
      } catch(e){ error.value=e.message; }
      loading.export=false;
    }
    async function doBatchExport() {
      const ids=Object.entries(exportSelected).filter(([,v])=>v).map(([k])=>k);
      if(!ids.length){ error.value='请勾选小说'; return; }
      loading.export='batch'; error.value=''; exportProgress.value=0;
      try {
        const r=await fetch(API+'/api/novels/export/batch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({novel_ids:ids,fmt:'txt'})});
        const data=await r.json(); let ok=0,fail=0;
        for(let i=0;i<data.results.length;i++){
          const item=data.results[i];
          if(item.success&&item.content){ downloadBlob(item.content,item.novel_id+'.txt',true); ok++; } else fail++;
          exportProgress.value=Math.round((i+1)/data.results.length*100);
        }
        if(ok>0) error.value='导出 '+ok+' 本'; setTimeout(()=>error.value='',3000);
      } catch(e){ error.value=e.message; }
      loading.export=false;
    }
    function downloadBlob(data, filename, delay=false, mime='text/plain;charset=utf-8') {
      const blob = typeof data === 'string' ? new Blob(['\uFEFF'+data],{type:mime}) : data;
      const url=URL.createObjectURL(blob); const a=document.createElement('a');
      a.href=url; a.download=filename; document.body.appendChild(a); a.click();
      document.body.removeChild(a); setTimeout(()=>URL.revokeObjectURL(url),delay?300:1000);
    }

    function addChapter(vol) {
      const max=Math.max(0,...vol.chapters.map(c=>c.number||0));
      vol.chapters.push({number:max+1,title:'新章节',summary:'待填写',emotion_curve:'平稳→紧张',characters:['主角'],hook:'悬念',target_words:1500});
      renumberChapters();
    }
    function addVolume() {
      const vols=planResult.value.outline.volumes;
      vols.push({number:(Math.max(0,...vols.map(v=>v.number||0))+1),title:'新卷',theme:'待填写',chapters:[{number:1,title:'第一章',summary:'待填写',emotion_curve:'平稳→紧张',characters:['主角'],hook:'悬念',target_words:1500}]});
      renumberChapters();
    }
    function removeVolume(vi) { planResult.value.outline.volumes.splice(vi,1); renumberChapters(); }
    function renumberChapters() {
      const vols=planResult.value?.outline?.volumes; if(!vols)return;
      let n=0; for(const vol of vols) for(const ch of vol.chapters){ n++; ch.number=n; }
      planResult.value.outline.total_chapters=n;
    }
    async function savePlan() {
      if(isBusy.value) return;
      if(!planResult.value) return; loading.saving=true; editSaved.value=false; error.value=''; renumberChapters();
      try {
        const r=await fetch(API+'/api/novels/'+encodeURIComponent(planResult.value.title),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(planResult.value)});
        if(!r.ok) throw new Error((await r.json().catch(()=>({detail:'失败'}))).detail);
        editSaved.value=true; await loadShelf(); setTimeout(()=>editSaved.value=false,3000);
      } catch(e){ error.value=e.message; }
      loading.saving=false;
    }
    async function confirmAndStart() {
      await savePlan();
      if (!error.value && planResult.value) {
        startWriting(planResult.value.title);
        // 安全兜底：如果 300ms 后 activeNovel 仍未设置，回退
        setTimeout(() => {
          if (currentView.value === 'write' && !activeNovel.value) {
            currentView.value = 'create';
            reportError('无法进入写作页面，请从书架重新打开小说', '跳转失败');
          }
        }, 300);
      }
    }

    function applyCustomStyle() { const d=customStyleDesc.value.trim(); if(d) form.style='自定义: '+d; }
